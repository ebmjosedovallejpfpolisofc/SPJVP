<link

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b
);
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:
rgba(255,255,255,.08);
backdrop-filter:
blur(10px);
padding:25px;
border-radius:25px;
margin-bottom:20px;
}

.title{
text-align:center;
margin-bottom:20px;
}

.title h1{
font-size:30px;
}

.title p{
opacity:.8;
margin-top:5px;
}

.btn{
width:100%;
border:none;
padding:15px;
border-radius:18px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
margin-top:12px;
transition:.2s;
}

.btn:hover{
transform:scale(1.02);
}

.btn-red{
background:#ef4444;
}

#reader{
border-radius:25px;
overflow:hidden;
display:none;
}

.status{
text-align:center;
font-weight:bold;
margin-top:10px;
}

.ok{
color:#4ade80;
}

.erro{
color:#ef4444;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
width:380px;
max-width:95%;
background:#1e293b;
padding:25px;
border-radius:25px;
}

.popup-box h2{
margin-bottom:15px;
text-align:center;
}

input,
select{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-top:10px;
background:#334155;
color:white;
}

.monitor{
display:flex;
align-items:center;
gap:10px;
background:
rgba(255,255,255,.06);
padding:12px;
border-radius:15px;
margin-top:10px;
}

.monitor img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

.hidden{
display:none;
}

</style>
</head>

">

</b>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"SUA_API_KEY",

authDomain:
"SEU_DOMINIO",

projectId:
"SEU_PROJECT_ID",

storageBucket:
"SEU_BUCKET",

messagingSenderId:
"SEU_SENDER_ID",

appId:
"SEU_APP_ID"

};

const app =
initializeApp(
firebaseConfig
);

const db =
getFirestore(
app
);

let deferredPrompt =
null;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt =
e;

}
);

window.instalarApp =
async function(){

if(
deferredPrompt
){

deferredPrompt.prompt();

}

}

const isStandalone =

window.matchMedia(
"(display-mode: standalone)"
).matches

||

window.navigator.standalone

||

document.referrer.includes(
"android-app://"
);

if(
isStandalone
){

document
.getElementById(
"blockSite"
)
.style.display =
"none";

document
.getElementById(
"appContent"
)
.classList
.remove(
"hidden"
);

document
.getElementById(
"reader"
)
.style.display =
"block";

}
else{

document
.getElementById(
"appContent"
)
.style.display =
"none";

}

window.abrirLogin =
function(){

document
.getElementById(
"popupLogin"
)
.style.display =
"flex";

}

window.fecharLogin =
function(){

document
.getElementById(
"popupLogin"
)
.style.display =
"none";

}

window.verEquipe =
function(){

document
.getElementById(
"popupEquipe"
)
.style.display =
"flex";

}

window.fecharEquipe =
function(){

document
.getElementById(
"popupEquipe"
)
.style.display =
"none";

}

let scanner =
null;

let cameras = [];

let currentCamera =
0;

async function iniciarScanner(){

scanner =
new Html5Qrcode(
"reader"
);

cameras =
await Html5Qrcode
.getCameras();

if(
cameras.length
){

iniciarCamera(
cameras[0].id
);

}

}

window.trocarCamera =
async function(){

if(
cameras.length
<= 1
)return;

currentCamera =

(
currentCamera
+ 1
)

%
cameras.length;

await scanner.stop();

iniciarCamera(
cameras[
currentCamera
].id
);

}

async function iniciarCamera(
cameraId
){

await scanner.start(

cameraId,

{

fps:10,

qrbox:{

width:250,
height:250

}

},

async (
decodedText
)=>{

procurarPessoa(
decodedText.trim()
);

},

()=>{}

);

}

async function procurarPessoa(
codigo
){

try{

let ref =
doc(
db,
"alunos",
codigo
);

let snap =
await getDoc(
ref
);

if(
snap.exists()
){

loginAutomatico(
snap.data(),
codigo,
"aluno"
);

return;

}

ref =
doc(
db,
"professores",
codigo
);

snap =
await getDoc(
ref
);

if(
snap.exists()
){

loginAutomatico(
snap.data(),
codigo,
"admin"
);

return;

}

document
.getElementById(
"status"
)
.innerHTML =

"❌ Não encontrado";

document
.getElementById(
"status"
)
.className =

"status erro";

}catch(err){

console.error(err);

}

}

window.fazerLogin =
async function(){

const id =

document
.getElementById(
"loginId"
)
.value
.trim();

const cargo =

document
.getElementById(
"loginCargo"
)
.value;

if(
!id
||
!cargo
){

alert(
"Preencha tudo."
);

return;

}

try{

let ref =
doc(
db,
"alunos",
id
);

let snap =
await getDoc(
ref
);

if(
snap.exists()
){

const data =
snap.data();

if(
data.cargo
!== cargo
){

alert(
"Cargo incorreto"
);

return;

}

salvarUsuario(
data,
id,
"aluno"
);

location.href =
"portal-aluno.html";

return;

}

ref =
doc(
db,
"professores",
id
);

snap =
await getDoc(
ref
);

if(
snap.exists()
){

const data =
snap.data();

if(
data.cargo
!== cargo
){

alert(
"Cargo incorreto"
);

return;

}

salvarUsuario(
data,
id,
"admin"
);

location.href =
"portal-monitor-prof.html";

return;

}

alert(
"ID não encontrado"
);

}catch(err){

console.error(
err
);

alert(
"Erro no login"
);

}

}

function salvarUsuario(
data,
id,
tipo
){

localStorage
.setItem(

"usuario",

JSON.stringify({

id,

nome:
data.nome,

cargo:
data.cargo,

foto:
data.foto
||
"",

tipo

})

);

}

function loginAutomatico(
data,
id,
tipo
){

salvarUsuario(
data,
id,
tipo
);

document
.getElementById(
"status"
)
.innerHTML =

"✅ Confirmado";

document
.getElementById(
"status"
)
.className =

"status ok";

setTimeout(()=>{

if(
tipo
===
"admin"
){

location.href =

"portal-monitor-prof.html";

}
else{

location.href =

"portal-aluno.html";

}

},1000);

}

if(
"serviceWorker"
in navigator
){

window.addEventListener(
"load",
()=>{

navigator
.serviceWorker
.register(
"./service-worker.js"
);

});

}

iniciarScanner();

</script>

</body>
</html>
