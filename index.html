<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPJVP Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:white;
  padding:20px;
}

.container{max-width:450px;margin:auto}

.title{text-align:center;margin-bottom:20px}
.title h1{font-size:28px}
.title p{opacity:.8}

#reader{
  border:3px solid #38bdf8;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(56,189,248,.4);
  margin-bottom:15px;
}

.btn{
  width:100%;
  border:none;
  padding:14px;
  border-radius:15px;
  background:#38bdf8;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-bottom:15px;
}

.status{
  text-align:center;
  font-weight:bold;
  margin-bottom:20px;
  font-size:18px;
}

.ok{color:#4ade80}
.erro{color:#f87171}

.card{
  display:none;
  background:rgba(255,255,255,.08);
  border-radius:25px;
  padding:20px;
}

.card img{
  width:140px;
  height:140px;
  border-radius:20px;
  object-fit:cover;
  display:block;
  margin:auto;
  border:4px solid #38bdf8;
}

.item{
  background:rgba(255,255,255,.06);
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  width:350px;
  background:#1e293b;
  border-radius:25px;
  padding:25px;
}

.popup-box input,
.popup-box select{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  margin-bottom:12px;
  background:#334155;
  color:white;
}
</style>
</head>
<body>

<div class="container">

<div class="title">
<h1>SPJVP Scanner</h1>
<p>Escaneie o QR ou código do crachá</p>
</div>

<button class="btn" onclick="abrirLogin()">
👤 Fazer Login
</button>

<div id="reader"></div>

<button class="btn" onclick="trocarCamera()">
🔄 Trocar Câmera
</button>

<div id="status" class="status">
Aguardando leitura...
</div>

<div class="card" id="card">
<img id="foto" src="">
<div class="item"><b>Nome:</b> <span id="nome">---</span></div>
<div class="item"><b>Motivo:</b> <span id="motivo">---</span></div>
<div class="item"><b>ID:</b> <span id="id">---</span></div>
<div class="item"><b>Tipo:</b> <span id="tipo">---</span></div>
</div>

</div>

<div id="popupLogin" class="popup">
<div class="popup-box">

<h2>Fazer Login</h2>

<input type="text" id="loginId" placeholder="Digite seu ID">

<select id="loginCargo">
<option value="">Selecione o cargo</option>

<option>Marcenaria: matutino t52 G: A</option>
<option>Marcenaria: matutino t52 G: B</option>
<option>Marcenaria: matutino t52 G: C</option>

<option>Marcenaria: vespertino t41 G: A</option>
<option>Marcenaria: vespertino t41 G: B</option>
<option>Marcenaria: vespertino t41 G: C</option>
  
<option>Marcenaria: vespertino t51 G: A</option>
<option>Marcenaria: vespertino t51 G: B</option>
<option>Marcenaria: vespertino t51 G: C</option>

<option>Marcenaria: Vespertino t50 G: A</option>
<option>Marcenaria: Vespertino t50 G: B</option>
<option>Marcenaria: Vespertino t50 G: C</option>

<option>Marcenaria: Vespertino Monitoria</option>
<option>Marcenaria: Professor(a)</option>

</select>

<button class="btn" onclick="fazerLogin()">
Entrar
</button>

<button class="btn" style="background:red"
onclick="fecharLogin()">
Fechar
</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
authDomain: "spjvp-49fde.firebaseapp.com",
projectId: "spjvp-49fde",
storageBucket: "spjvp-49fde.firebasestorage.app",
messagingSenderId: "790148342609",
appId: "1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const status = document.getElementById("status");
const card = document.getElementById("card");

let scanner = new Html5Qrcode("reader");
let cameras = [];
let currentCamera = 0;
let lendo = false;

async function procurarPessoa(codigo){

if(lendo) return;
lendo = true;

try{

let ref = doc(db,"alunos",codigo);
let snap = await getDoc(ref);

if(snap.exists()){
mostrarPessoa(snap.data(),codigo,"Aluno");
return;
}

ref = doc(db,"professores",codigo);
snap = await getDoc(ref);

if(snap.exists()){
mostrarPessoa(snap.data(),codigo,"Professor");
return;
}

naoConfirmado();

}catch(err){
console.error(err);
naoConfirmado();
}

setTimeout(()=>{ lendo = false },2000);
}

function mostrarPessoa(data,id,tipo){
status.innerHTML = "✅ Confirmado";
status.className = "status ok";

card.style.display = "block";

document.getElementById("foto").src = data.foto || "";
document.getElementById("nome").innerText = data.nome;
document.getElementById("motivo").innerText = data.motivo;
document.getElementById("id").innerText = id;
document.getElementById("tipo").innerText = tipo;
}

function naoConfirmado(){
status.innerHTML = "❌ Não confirmado";
status.className = "status erro";
card.style.display = "none";
}

window.trocarCamera = async function(){
if(cameras.length <= 1) return;

currentCamera =
(currentCamera + 1) % cameras.length;

await scanner.stop();
iniciarCamera(cameras[currentCamera].id);
}

async function iniciarCamera(id){
await scanner.start(
id,
{
fps:10,
qrbox:{width:250,height:250}
},
(decodedText)=>{
procurarPessoa(decodedText.trim());
}
);
}

Html5Qrcode.getCameras()
.then(lista=>{
cameras = lista;
if(cameras.length){
iniciarCamera(cameras[0].id);
}
});

window.abrirLogin = function(){
document.getElementById("popupLogin")
.style.display = "flex";
}

window.fecharLogin = function(){
document.getElementById("popupLogin")
.style.display = "none";
}

window.fazerLogin = async function(){

const id =
document.getElementById("loginId")
.value.trim();

const cargo =
document.getElementById("loginCargo")
.value;

if(!id || !cargo){
alert("Preencha tudo");
return;
}

try{

let ref = doc(db,"alunos",id);
let snap = await getDoc(ref);

if(!snap.exists()){
ref = doc(db,"professores",id);
snap = await getDoc(ref);
}

if(!snap.exists()){
alert("ID não encontrado");
return;
}

const data = snap.data();

if(data.cargo !== cargo){
alert("Cargo incorreto");
return;
}

const cargoLower =
cargo.toLowerCase();

const ehAdmin =
cargoLower.includes("monitor")
||
cargoLower.includes("professor");

const tipo =
ehAdmin
? "admin"
: "aluno";

localStorage.setItem(
"usuario",
JSON.stringify({
id,
nome:data.nome,
cargo:data.cargo,
tipo
})
);

if(tipo === "admin"){
location.href =
"portal-monitor-prof.html";
}else{
location.href =
"portal-aluno.html";
}

}catch(err){
console.error(err);
alert("Erro no login");
}
}
</script>

</body>
</html>
