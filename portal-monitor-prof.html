<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial,sans-serif;
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:rgba(255,255,255,.08);
border-radius:20px;
padding:20px;
margin-bottom:20px;
backdrop-filter:blur(10px);
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
overflow:auto;
}

th,td{
border:1px solid rgba(255,255,255,.2);
padding:12px;
text-align:center;
}

th{
background:#0f172a;
}

td{
background:rgba(255,255,255,.05);
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin:8px 0;
background:#334155;
color:white;
}

.item{
background:rgba(255,255,255,.06);
padding:12px;
border-radius:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1 id="ola">Portal Admin</h1>
<p id="cargo"></p>

<br>

<button onclick="mostrarAdicionar()">
➕ Adicionar Aluno
</button>

</div>

<div class="card">

<table>

<thead>

<tr>
<th rowspan="2">Turma</th>
<th colspan="4">Ações</th>
</tr>

<tr>
<th>Avaliar</th>
<th>Pedidos</th>
<th>Atividades</th>
<th>Visualizar Atividades Enviadas</th>
</tr>

</thead>

<tbody id="tabelaTurmas">
</tbody>

</table>

</div>

<div class="card" id="conteudo">
Selecione uma opção.
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
authDomain:"spjvp-49fde.firebaseapp.com",
projectId:"spjvp-49fde",
storageBucket:"spjvp-49fde.firebasestorage.app",
messagingSenderId:"790148342609",
appId:"1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario =
JSON.parse(localStorage.getItem("usuario"));

if(!usuario || usuario.tipo !== "admin"){
location.href = "index.html";
}

document.getElementById("ola")
.innerText =
`Olá, ${usuario.nome}`;

document.getElementById("cargo")
.innerText =
usuario.cargo;

const box =
document.getElementById("conteudo");

  const turmas = [];

[41,50,51,52].forEach(turma=>{

["A","B","C"].forEach(grupo=>{

let periodo = "Vespertino";

if(turma == 52){
periodo = "matutino";
}

turmas.push(
`Marcenaria: ${periodo} t${turma} G: ${grupo}`
);

});

});

const tabela =
document.getElementById("tabelaTurmas");

turmas.forEach(turma=>{

const match =
turma.match(/t(\d+).*G: ([A-C])/i);

const numero =
match[1];

const grupo =
match[2];

tabela.innerHTML += `
<tr>

<td>
Turma ${numero} G: ${grupo}
</td>

<td>
<button onclick=
"avaliarTurma('${turma}')">
Avaliar
</button>
</td>

<td>
<button onclick=
"verPedidos('${turma}')">
Pedidos
</button>
</td>

<td>
<button onclick=
"criarAtividade('${turma}')">
Atividades
</button>
</td>

<td>
<button onclick=
"visualizarAtividades('${turma}')">
Visualizar
</button>
</td>

</tr>
`;

});

function gerarId(nome){

const partes =
nome.trim().split(" ");

const ini1 =
partes[0][0].toUpperCase();

const ini2 =
partes[
partes.length - 1
][0].toUpperCase();

return Math.floor(
Math.random()*90+10
)
+
ini1
+
ini2
+
Math.floor(
Math.random()*9000+1000
);
}

window.mostrarAdicionar =
function(){

box.innerHTML = `

<h2>
Adicionar Aluno
</h2>

<input
id="nome"
placeholder="Nome do aluno"
>

<select id="cargoAluno">

${turmas.map(t=>
`<option>${t}</option>`
).join("")}

</select>

<input
id="motivo"
placeholder="Motivo"
>

<input
id="foto"
placeholder="Link da imagem (opcional)"
>

<button onclick=
"salvarAluno()">
Salvar
</button>

`;

};

window.salvarAluno =
async function(){

const nome =
document.getElementById("nome")
.value;

const cargo =
document.getElementById("cargoAluno")
.value;

const motivo =
document.getElementById("motivo")
.value;

const foto =
document.getElementById("foto")
.value;

if(!nome || !motivo){

alert(
"Preencha nome e motivo"
);

return;
}

const id =
gerarId(nome);

await setDoc(
doc(db,"alunos",id),
{
nome,
cargo,
motivo,
foto: foto || "",
pedidos:[]
}
);

alert(
"Aluno criado! ID: " + id
);

};

  window.avaliarTurma =
async function(turma){

const q =
query(
collection(db,"alunos"),
where("cargo","==",turma)
);

const snap =
await getDocs(q);

let html = `

<h2>
${turma}
</h2>

<table>

<tr>
<th>Nome</th>
<th>Obediência</th>
<th>Participação</th>
</tr>

`;

snap.forEach(docx=>{

const d =
docx.data();

html += `

<tr>

<td>
${d.nome}
</td>

<td>
<input
id="ob_${d.nome}"
placeholder="Nota"
>
</td>

<td>
<input
id="pa_${d.nome}"
placeholder="Nota"
>
</td>

</tr>

`;

});

html += `

</table>

<br>

<button onclick=
"salvarNotas('${turma}')">
Salvar Notas
</button>

`;

box.innerHTML = html;

};

window.salvarNotas =
async function(turma){

const q =
query(
collection(db,"alunos"),
where("cargo","==",turma)
);

const snap =
await getDocs(q);

let obediencia = {};
let participacao = {};

snap.forEach(docx=>{

const d =
docx.data();

obediencia[d.nome] =
document.getElementById(
"ob_" + d.nome
).value || "-";

participacao[d.nome] =
document.getElementById(
"pa_" + d.nome
).value || "-";

});

const turmaFormatada =
turma.match(
/t(\d+).*G: ([A-C])/i
);

const nomeTurma =
`T${turmaFormatada[1]}
G: ${turmaFormatada[2]}`;

await setDoc(
doc(
db,
"Notas",
nomeTurma
),
{
"Obediência":
obediencia,

"Participação":
participacao
}
);

alert(
"Notas salvas!"
);

};

window.verPedidos =
async function(turma){

const q =
query(
collection(db,"alunos"),
where("cargo","==",turma)
);

const snap =
await getDocs(q);

let html =
`<h2>Pedidos</h2>`;

snap.forEach(docx=>{

const d =
docx.data();

(d.pedidos || [])
.forEach(pedido=>{

html += `

<div class="item">

<b>
${d.nome}
</b>

<br>

${pedido.texto || pedido}

</div>

`;

});

});

box.innerHTML =
html ||
"Nenhum pedido";

};

  window.criarAtividade =
function(turma){

box.innerHTML = `

<h2>
Nova Atividade
</h2>

<p>
Turma:
<b>${turma}</b>
</p>

<input
id="atividadeNome"
placeholder=
"Nome da atividade"
>

<label>
Data de envio
</label>

<input
type="date"
id="envio"
>

<label>
Data de entrega
</label>

<input
type="date"
id="entrega"
>

<button onclick=
"salvarAtividade('${turma}')">
Salvar
</button>

`;

};

window.salvarAtividade =
async function(turma){

const nome =
document.getElementById(
"atividadeNome"
).value;

const envio =
document.getElementById(
"envio"
).value;

const entrega =
document.getElementById(
"entrega"
).value;

if(
!nome ||
!envio ||
!entrega
){
alert(
"Preencha tudo"
);
return;
}

const ref =
doc(
db,
"atividades",
turma
);

const snap =
await getDoc(ref);

let atividades =
[];

if(snap.exists()){

atividades =
snap.data()
.atividades
|| [];

}

atividades.push({
nome,
envio,
entrega
});

await setDoc(
ref,
{
atividades
}
);

alert(
"Atividade salva!"
);

};

window.visualizarAtividades =
async function(turma){

const ref =
doc(
db,
"atividades",
turma
);

const snap =
await getDoc(ref);

let html =
`
<h2>
Atividades Enviadas
</h2>
`;

const atividades =
snap.exists()
?
snap.data()
.atividades
|| []
:
[];

if(
atividades.length
=== 0
){
html +=
`
<div class="item">
Nenhuma atividade.
</div>
`;
}

atividades.forEach(a=>{

html += `

<div class="item">

<b>
${a.nome}
</b>

<br><br>

📅 Envio:
${a.envio}

<br>

⏰ Entrega:
${a.entrega}

</div>

`;

});

box.innerHTML =
html;

};

</script>

</body>
</html>
