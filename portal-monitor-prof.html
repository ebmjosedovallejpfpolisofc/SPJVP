<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial,sans-serif;
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:rgba(255,255,255,.08);
border-radius:20px;
padding:20px;
margin-bottom:20px;
backdrop-filter:blur(10px);
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid rgba(255,255,255,.2);
padding:12px;
text-align:center;
}

th{
background:#0f172a;
}

td{
background:rgba(255,255,255,.05);
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin:8px 0;
background:#334155;
color:white;
}

.item{
background:rgba(255,255,255,.06);
padding:12px;
border-radius:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1 id="ola">Portal Admin</h1>
<p id="cargo"></p>
</div>

<div class="card">

<table>

<thead>

<tr>
<th rowspan="2">Turma</th>
<th colspan="6">Ações</th>
</tr>

<tr>
<th>Avaliar</th>
<th>Pedidos</th>
<th>Atividades</th>
<th>Visualizar Atividades</th>
<th>Visualizar Turma</th>
<th>Aluno</th>
</tr>

</thead>

<tbody id="tabelaTurmas"></tbody>

</table>

</div>

<div class="card" id="conteudo">
Selecione uma opção.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
authDomain:"spjvp-49fde.firebaseapp.com",
projectId:"spjvp-49fde",
storageBucket:"spjvp-49fde.firebasestorage.app",
messagingSenderId:"790148342609",
appId:"1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario || usuario.tipo !== "admin"){
location.href = "index.html";
}

document.getElementById("ola").innerText = `Olá, ${usuario.nome}`;
document.getElementById("cargo").innerText = usuario.cargo;

const box = document.getElementById("conteudo");

const turmas = [];

[41,50,51,52].forEach(turma=>{
["A","B","C"].forEach(grupo=>{
let periodo = turma == 52 ? "matutino" : "vespertino";
turmas.push(`Marcenaria: ${periodo} t${turma} G: ${grupo}`);
});
});

const tabela = document.getElementById("tabelaTurmas");

turmas.forEach(turma=>{

tabela.innerHTML += `
<tr>
<td>${turma}</td>

<td><button onclick="avaliarTurma('${turma}')">Avaliar</button></td>
<td><button onclick="verPedidos('${turma}')">Pedidos</button></td>
<td><button onclick="criarAtividade('${turma}')">Atividades</button></td>
<td><button onclick="visualizarAtividades('${turma}')">Ver</button></td>
<td><button onclick="visualizarTurma('${turma}')">Turma</button></td>
<td><button onclick="mostrarAdicionar('${turma}')">Adicionar</button></td>
</tr>
`;
});

// ================= ADICIONAR ALUNO =================
window.mostrarAdicionar = function(turma){

box.innerHTML = `
<h2>Adicionar Aluno</h2>

<p>Turma selecionada:</p>
<b>${turma}</b>

<input id="nome" placeholder="Nome do aluno">
<input id="motivo" placeholder="Motivo">
<input id="foto" placeholder="Foto (opcional)">

<button onclick="salvarAluno('${turma}')">Salvar</button>
`;
};

function gerarId(nome){
const p = nome.trim().split(" ");
return Math.floor(Math.random()*90+10)
+ p[0][0].toUpperCase()
+ p[p.length-1][0].toUpperCase()
+ Math.floor(Math.random()*9000+1000);
}

window.salvarAluno = async function(turma){

const nome = document.getElementById("nome").value;
const motivo = document.getElementById("motivo").value;
const foto = document.getElementById("foto").value;

if(!nome || !motivo){
alert("Preencha tudo");
return;
}

const id = gerarId(nome);

await setDoc(doc(db,"alunos",id),{
nome,
cargo: turma,
motivo,
foto: foto || "",
pedidos:[]
});

alert("Aluno criado! ID: " + id);
};

// ================= TURMA =================
window.visualizarTurma = async function(turma){

const q = query(collection(db,"alunos"),where("cargo","==",turma));
const snap = await getDocs(q);

let html = `<h2>Alunos da Turma</h2><h3>${turma}</h3>`;

if(snap.empty){
box.innerHTML = html + `<div class="item">Nenhum aluno.</div>`;
return;
}

snap.forEach(d=>{
const data = d.data();

html += `
<div class="item">
<b>Nome:</b> ${data.nome}<br>
<b>ID:</b> ${d.id}
</div>
`;
});

box.innerHTML = html;
};

</script>

</body>
</html>
