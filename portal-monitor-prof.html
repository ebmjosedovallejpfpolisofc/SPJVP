<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Admin - Upgrade</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.container{max-width:1400px;margin:auto;}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid rgba(255,255,255,.2);
padding:10px;
text-align:center;
}

th{background:#0f172a;}

button{
padding:10px 12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
margin:2px;
}

.item{
background:rgba(255,255,255,.06);
padding:10px;
margin:8px 0;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#334155;
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Portal Admin</h1>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Turma</th>
<th>Avaliar</th>
<th>Pedidos</th>
<th>Atividades</th>
<th>Ver Atividades</th>
<th>Chamada</th>
<th>Turma</th>
<th>Aluno</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<div class="card" id="conteudo">
Selecione uma opção
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
setDoc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
authDomain:"spjvp-49fde.firebaseapp.com",
projectId:"spjvp-49fde",
storageBucket:"spjvp-49fde.firebasestorage.app",
messagingSenderId:"790148342609",
appId:"1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const box = document.getElementById("conteudo");

const turmas = [
"Marcenaria: vespertino t41 G: A",
"Marcenaria: vespertino t41 G: B",
"Marcenaria: vespertino t41 G: C",

"Marcenaria: vespertino t50 G: A",
"Marcenaria: vespertino t50 G: B",
"Marcenaria: vespertino t50 G: C",

"Marcenaria: vespertino t51 G: A",
"Marcenaria: vespertino t51 G: B",
"Marcenaria: vespertino t51 G: C",

"Marcenaria: matutino t52 G: A",
"Marcenaria: matutino t52 G: B",
"Marcenaria: matutino t52 G: C",

];

// ================= TABELA =================
const tabela = document.getElementById("tabela");

turmas.forEach(turma=>{
tabela.innerHTML += `
<tr>
<td>${turma}</td>
<td><button onclick="avaliar('${turma}')">Avaliar</button></td>
<td><button onclick="pedidos('${turma}')">Pedidos</button></td>
<td><button onclick="atividades('${turma}')">Atividades</button></td>
<td><button onclick="verAtividades('${turma}')">Ver</button></td>
<td><button onclick="chamada('${turma}')">Chamada</button></td>
<td><button onclick="verTurma('${turma}')">Turma</button></td>
<td><button onclick="addAluno('${turma}')">Aluno</button></td>
</tr>
`;
});

// ================= TURMA =================
window.verTurma = async function(turma){
const q = query(collection(db,"alunos"),where("cargo","==",turma));
const snap = await getDocs(q);

let html = `<h2>Turma</h2>`;

snap.forEach(d=>{
html += `<div class="item">${d.data().nome} - ${d.id}</div>`;
});

box.innerHTML = html;
};

// ================= ADICIONAR ALUNO =================
window.addAluno = function(turma){

box.innerHTML = `
<h2>Adicionar Aluno</h2>
<p>${turma}</p>

<input id="nome" placeholder="Nome">
<input id="motivo" placeholder="Motivo">

<button onclick="salvarAluno('${turma}')">Salvar</button>
`;
};

window.salvarAluno = async function(turma){
const nome = document.getElementById("nome").value;
const motivo = document.getElementById("motivo").value;

const id = Math.random().toString(36).substr(2,6);

await setDoc(doc(db,"alunos",id),{
nome,
cargo: turma,
motivo,
pedidos:[]
});

alert("Aluno criado");
};

// ================= CHAMADA =================
window.chamada = async function(turma){
const q = query(collection(db,"alunos"),where("cargo","==",turma));
const snap = await getDocs(q);

let html = `<h2>Chamada</h2>`;

snap.forEach(d=>{
const id = d.id;
const data = d.data();

html += `
<div class="item">
${data.nome}<br>

<button onclick="status('${id}','presenca','${turma}')">P</button>
<button onclick="status('${id}','falta_inj','${turma}')">FI</button>
<button onclick="status('${id}','falta_jus','${turma}')">FJ</button>
<button onclick="desistir('${id}')">Desistir</button>
</div>
`;
});

box.innerHTML = html;
};

window.status = async function(id,status,turma){
const ref = doc(db,"chamadas",turma+"-"+new Date().toISOString().split('T')[0]);

await setDoc(ref,{
[id]:status
},{merge:true});

alert("Salvo");
};

window.desistir = async function(id){
await deleteDoc(doc(db,"alunos",id));
alert("Aluno removido");
};

// ================= ATIVIDADES =================
window.verAtividades = async function(turma){
const ref = doc(db,"atividades",turma);
const snap = await getDoc(ref);

let html = `<h2>Atividades</h2>`;

if(!snap.exists()){
box.innerHTML = "Nenhuma atividade";
return;
}

const at = snap.data().atividades || [];

at.forEach((a,i)=>{
html += `
<div class="item">
<b>${a.nome}</b><br>
📅 ${a.envio} - ⏰ ${a.entrega}<br>

<button onclick="verEntregas('${turma}',${i})">Ver entregas</button>
<button onclick="encerrar('${turma}',${i})">Encerrar</button>
</div>
`;
});

box.innerHTML = html;
};

window.verEntregas = async function(turma,i){
const ref = doc(db,"atividades",turma);
const snap = await getDoc(ref);

const at = snap.data().atividades[i];

let html = `<h2>Entregas</h2>`;

const entregas = at.entregas || {};

Object.keys(entregas).forEach(id=>{
html += `<div class="item">${entregas[id].nome} - ${entregas[id].data}</div>`;
});

box.innerHTML = html;
};

window.encerrar = async function(turma,i){
const ref = doc(db,"atividades",turma);
const snap = await getDoc(ref);

let at = snap.data().atividades;

at[i].encerrada = true;

await setDoc(ref,{atividades:at});

alert("Atividade encerrada");
};

</script>

</body>
</html>
