<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,.08);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

h1{margin:0 0 10px}

.buttons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

button{
  padding:14px;
  border:none;
  border-radius:14px;
  background:#38bdf8;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#content{margin-top:20px}

.item{
  background:rgba(255,255,255,.06);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h1 id="saudacao">Olá</h1>
<div id="cargo"></div>
</div>

<div class="buttons">
<button onclick="mostrarGrupo()">Meu Grupo</button>
<button onclick="mostrarPedidos()">Meus Pedidos</button>
<button onclick="mostrarAtividades()">Atividades</button>
<button onclick="mostrarNotas()">Minha Nota</button>
</div>

<div id="content" class="card">Selecione uma opção.</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
query,
where,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
authDomain: "spjvp-49fde.firebaseapp.com",
projectId: "spjvp-49fde",
storageBucket: "spjvp-49fde.firebasestorage.app",
messagingSenderId: "790148342609",
appId: "1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario || usuario.tipo !== "aluno"){
location.href = "index.html";
}

const hora = new Date().getHours();
const periodo =
hora < 12 ? "Bom dia" :
hora < 18 ? "Boa tarde" :
"Boa noite";

document.getElementById("saudacao").innerText =
`Olá, ${usuario.nome}, ${periodo}`;

document.getElementById("cargo").innerText = usuario.cargo;

const content = document.getElementById("content");


// ================= GRUPO =================
window.mostrarGrupo = async function(){

content.innerHTML = "<h2>Meu Grupo</h2>";

const q = query(collection(db,"alunos"),where("cargo","==",usuario.cargo));
const snap = await getDocs(q);

snap.forEach(doc=>{
content.innerHTML += `<div class="item">${doc.data().nome}</div>`;
});
};


// ================= PEDIDOS =================
window.mostrarPedidos = async function(){

const ref = doc(db,"alunos",usuario.id);
const snap = await getDoc(ref);

const pedidos = snap.data()?.pedidos || [];

content.innerHTML = `
<h2>Meus Pedidos</h2>

<input id="pedidoTexto" placeholder="Escreva seu pedido">
<button onclick="enviarPedido()">Enviar pedido</button>

<hr>

<div id="lista"></div>
`;

const lista = document.getElementById("lista");

pedidos.forEach(p=>{
lista.innerHTML += `
<div class="item">
<b>${p.texto}</b><br>
📅 ${p.envio}
</div>
`;
});
};


window.enviarPedido = async function(){

const texto = document.getElementById("pedidoTexto").value;

if(!texto) return alert("Escreva algo!");

const ref = doc(db,"alunos",usuario.id);
const snap = await getDoc(ref);

let pedidos = snap.data()?.pedidos || [];

pedidos.push({
texto,
envio: new Date().toLocaleDateString("pt-BR")
});

await setDoc(ref,{pedidos},{merge:true});

alert("Pedido enviado!");
mostrarPedidos();
};


// ================= ATIVIDADES =================
window.mostrarAtividades = async function(){

const ref = doc(db,"atividades",usuario.cargo);
const snap = await getDoc(ref);

content.innerHTML = "<h2>Atividades</h2>";

if(!snap.exists()){
content.innerHTML += "Nenhuma atividade.";
return;
}

const atividades = snap.data().atividades || [];

const hoje = new Date();

atividades.forEach((a,i)=>{

let status = a.status?.[usuario.id] || "aberto";

const fim = new Date(a.entrega);

if(fim < hoje && status !== "enviado"){
status = "expirado";
}

a.status = a.status || {};
a.status[usuario.id] = status;

setDoc(doc(db,"atividades",usuario.cargo),{
atividades
},{merge:true});

let cor = "#38bdf8";
if(status === "enviado") cor = "lime";
if(status === "expirado") cor = "red";
if(status === "aberto") cor = "orange";

const assunto = encodeURIComponent(`Atividade: ${a.nome}`);
const corpo = encodeURIComponent(
`Aluno: ${usuario.nome}\nID: ${usuario.id}\nAtividade: ${a.nome}`
);

const mailto =
`mailto:salete.santos@prof.pmf.sc.gov.br?subject=${assunto}&body=${corpo}`;

content.innerHTML += `
<div class="item">
<b>${a.nome}</b><br>
📅 ${a.envio}<br>
⏰ ${a.entrega}<br>

Status: <b style="color:${cor}">${status.toUpperCase()}</b><br><br>

<button onclick="enviarAtividade('${i}','${status}','${mailto}')">
Enviar por e-mail
</button>
</div>
`;
});
};


window.enviarAtividade = async function(i,status,mailto){

if(status === "enviado"){
alert("Já foi enviado no sistema do professor.");
return;
}

window.location.href = mailto;

const ref = doc(db,"atividades",usuario.cargo);
const snap = await getDoc(ref);

let atividades = snap.data().atividades;

atividades[i].status = atividades[i].status || {};
atividades[i].status[usuario.id] = "enviado";

await setDoc(ref,{atividades},{merge:true});

alert("Atividade enviada!");
mostrarAtividades();
};


// ================= NOTAS =================
window.mostrarNotas = async function(){

const turma = usuario.cargo.match(/t(\d+).*G: ([A-C])/i);
if(!turma) return;

const turmaDoc = `T${turma[1]} G: ${turma[2]}`;

const snap = await getDoc(doc(db,"Notas",turmaDoc));

content.innerHTML = "<h2>Minha Nota</h2>";

if(!snap.exists()){
content.innerHTML += "Sem notas.";
return;
}

const data = snap.data();

const ob = data["Obediência"]?.[usuario.nome] ?? "-";
const pa = data["Participação"]?.[usuario.nome] ?? "-";

content.innerHTML += `
<div class="item">
Obediência: ${ob}<br>
Participação: ${pa}
</div>
`;
};

</script>

</body>
</html>
