<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Aluno - SGJVP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:25px;
margin-bottom:20px;
backdrop-filter:blur(10px);
}

.header h1{
font-size:28px;
}

.header p{
opacity:.8;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card-btn{
background:rgba(255,255,255,.08);
border:none;
padding:25px;
border-radius:25px;
color:white;
font-size:18px;
cursor:pointer;
transition:.2s;
backdrop-filter:blur(10px);
}

.card-btn:hover{
transform:scale(1.03);
background:#38bdf8;
}

.content{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:25px;
min-height:300px;
backdrop-filter:blur(10px);
}

.item{
background:rgba(255,255,255,.06);
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.btn{
border:none;
padding:12px 18px;
border-radius:15px;
background:#38bdf8;
color:white;
cursor:pointer;
margin-top:10px;
font-size:15px;
}

.btn-red{
background:#ef4444;
}

.ok{
color:#4ade80;
font-weight:bold;
}

.erro{
color:#ef4444;
font-weight:bold;
}

input, textarea{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:10px;
background:#334155;
color:white;
}

textarea{
resize:none;
height:100px;
}

.chat-box{
height:300px;
overflow-y:auto;
background:rgba(255,255,255,.05);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.msg-prof{
background:#38bdf8;
padding:12px;
border-radius:15px;
margin-bottom:10px;
}

.msg-aluno{
background:#475569;
padding:12px;
border-radius:15px;
margin-bottom:10px;
text-align:right;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1 id="saudacao">
Olá, aluno
</h1>

<p id="cargoAluno">
Carregando cargo...
</p>
</div>

<div class="grid">

<button class="card-btn"
onclick="mostrarGrupo()">
👥 Meu Grupo
</button>

<button class="card-btn"
onclick="mostrarPedidos()">
📦 Fazer Pedido
</button>

<button class="card-btn"
onclick="mostrarAtividades()">
📚 Atividades
</button>

<button class="card-btn"
onclick="mostrarNotas()">
📝 Minha Nota
</button>

<button class="card-btn"
onclick="mostrarChat()">
💬 Chat com Professor
</button>

</div>

<div class="content"
id="conteudo">

Selecione uma opção acima.

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
setDoc,
addDoc,
serverTimestamp,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"COLE_SUA_API_KEY",

authDomain:
"SEU_DOMINIO",

projectId:
"SEU_PROJECT_ID",

storageBucket:
"SEU_BUCKET",

messagingSenderId:
"SEU_SENDER_ID",

appId:
"SEU_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const usuario =
JSON.parse(
localStorage.getItem("usuario")
);

if(!usuario){
location.href =
"index.html";
}

const box =
document.getElementById(
"conteudo"
);

function saudacao(){

const hora =
new Date().getHours();

let periodo =
"Boa noite";

if(hora < 12){
periodo =
"Bom dia";
}
else if(hora < 18){
periodo =
"Boa tarde";
}

document.getElementById(
"saudacao"
).innerText =
`${periodo}, ${usuario.nome}`;

document.getElementById(
"cargoAluno"
).innerText =
usuario.cargo;

}

saudacao();

window.mostrarGrupo = async function(){

box.innerHTML =
"<h2>Carregando grupo...</h2>";

const q =
query(
collection(db,"alunos"),
where(
"cargo",
"==",
usuario.cargo
)
);

const snap =
await getDocs(q);

let html =
"<h2>👥 Meu Grupo</h2>";

snap.forEach(docx=>{

const d =
docx.data();

html += `
<div class="item">
${d.nome}
</div>
`;

});

box.innerHTML =
html;

}

window.mostrarPedidos =
function(){

box.innerHTML = `

<h2>
📦 Fazer Pedido
</h2>

<textarea
id="pedidoTexto"
placeholder="Digite seu pedido...">
</textarea>

<button
class="btn"
onclick="enviarPedido()">

Enviar Pedido

</button>

`;

}

window.enviarPedido =
async function(){

const texto =
document
.getElementById(
"pedidoTexto"
)
.value
.trim();

if(!texto){
alert(
"Digite algo"
);
return;
}

await addDoc(
collection(
db,
"pedidos"
),
{
nome:
usuario.nome,

id:
usuario.id,

cargo:
usuario.cargo,

pedido:
texto,

data:
new Date()
.toLocaleString(),

timestamp:
serverTimestamp()
}
);

alert(
"Pedido enviado!"
);

mostrarPedidos();

}

window.mostrarAtividades =
async function(){

box.innerHTML =
"<h2>Carregando...</h2>";

const ref =
doc(
db,
"atividades",
usuario.cargo
);

const snap =
await getDoc(ref);

if(!snap.exists()){

box.innerHTML =
"<h2>Sem atividades</h2>";

return;

}

const data =
snap.data();

let html =
"<h2>📚 Atividades</h2>";

for(
const atividade
of
data.atividades
){

const hoje =
new Date();

const final =
new Date(
atividade.entrega
);

const expirou =
hoje > final;

const enviado =
atividade.enviados
?.includes(
usuario.id
);

html += `

<div class="item">

<h3>
${atividade.nome}
</h3>

<p>
Envio:
${atividade.envio}
</p>

<p>
Entrega:
${atividade.entrega}
</p>

`;

if(expirou
&&
!enviado){

html += `
<p class="erro">

DATA FINAL DE ENTREGA
JÁ ULTRAPASSADA!

</p>
`;

}
else if(enviado){

html += `
<p class="ok">

ATIVIDADE ENVIADA
(se não enviou,
converse com
monitor ou professora)

</p>
`;

}
else{

html += `
<p class="ok">

ENTREGA EM ABERTO!
ENVIE ABAIXO

</p>

<button
class="btn"
onclick="enviarEmail(
'${atividade.nome}'
)">

📤 Enviar

</button>
`;

}

html +=
"</div>";

}

box.innerHTML =
html;

}

window.enviarEmail =
async function(
atividade
){

const body =
encodeURIComponent(

`Atividade:
${atividade}

Do aluno:
${usuario.nome}
(ID:
${usuario.id})`

);

location.href =

`mailto:
salete.santos@prof.pmf.sc.gov.br

?subject=Entrega
de Atividade

&body=${body}`;

const ref =
doc(
db,
"atividades",
usuario.cargo
);

const snap =
await getDoc(ref);

if(!snap.exists())
return;

const dados =
snap.data();

dados.atividades =
dados.atividades.map(
a=>{

if(
a.nome
===
atividade
){

if(
!a.enviados
)
a.enviados = [];

if(
!a.enviados
.includes(
usuario.id
)
){

a.enviados
.push(
usuario.id
);

}

}

return a;

}
);

await setDoc(
ref,
dados
);

mostrarAtividades();

}

window.mostrarNotas =
async function(){

const turma =
usuario.cargo
.match(
/t(\d+).*G:\s([A-C])/i
);

if(!turma){
box.innerHTML =
"Erro turma";
return;
}

const nomeTurma =
`T${turma[1]}
G: ${turma[2]}`;

const ref =
doc(
db,
"Notas",
nomeTurma
);

const snap =
await getDoc(
ref
);

if(!snap.exists()){

box.innerHTML =
"<h2>Sem notas</h2>";

return;

}

const data =
snap.data();

box.innerHTML = `

<h2>
📝 Minhas Notas
</h2>

<div class="item">

<b>Obediência:</b>

${
data["Obediência"]
?.[usuario.nome]
||
"-"
}

</div>

<div class="item">

<b>Participação:</b>

${
data["Participação"]
?.[usuario.nome]
||
"-"
}

</div>

`;

}

window.mostrarChat =
function(){

box.innerHTML = `

<h2>
💬 Chat
</h2>

<div
class="chat-box"
id="chatBox">

Carregando...

</div>

<textarea
id="mensagem"
placeholder=
"Mensagem">
</textarea>

<button
class="btn"
onclick="enviarMensagem()">

Enviar

</button>

`;

const ref =
collection(
db,
"chat"
);

const q =
query(
ref,
where(
"idAluno",
"==",
usuario.id
)
);

onSnapshot(
q,
snapshot=>{

let html =
"";

let profMandou =
false;

snapshot.forEach(
docx=>{

const d =
docx.data();

if(
d.autor
===
"prof"
){

profMandou =
true;

html += `
<div class="msg-prof">
${d.texto}
</div>
`;

}
else{

html += `
<div class="msg-aluno">
${d.texto}
</div>
`;

}

});

document
.getElementById(
"chatBox"
)
.innerHTML =
html
||
"Sem mensagens";

window.podeResponder =
profMandou;

}
);

}

window.enviarMensagem =
async function(){

if(
!window.podeResponder
){

alert(
"O professor precisa mandar mensagem primeiro."
);

return;

}

const texto =
document
.getElementById(
"mensagem"
)
.value
.trim();

if(!texto)
return;

await addDoc(
collection(
db,
"chat"
),
{
idAluno:
usuario.id,

nome:
usuario.nome,

texto,

autor:
"aluno",

data:
serverTimestamp()
}
);

document
.getElementById(
"mensagem"
)
.value = "";

}

</script>
</body>
</html>
