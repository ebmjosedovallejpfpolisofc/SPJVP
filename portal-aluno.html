<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}
.container{max-width:900px;margin:auto}
.card{
  background:rgba(255,255,255,.08);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}
h1{margin:0 0 10px}
.buttons{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
}
button{
 padding:14px;border:none;border-radius:14px;
 background:#38bdf8;color:white;font-size:16px;cursor:pointer;
}
#content{margin-top:20px}
.item{
 background:rgba(255,255,255,.06);
 padding:14px;border-radius:12px;margin-bottom:10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1 id="saudacao">Olá</h1>
    <div id="cargo"></div>
  </div>

  <div class="buttons">
    <button onclick="mostrarGrupo()">Meu Grupo</button>
    <button onclick="mostrarPedidos()">Meus Pedidos</button>
    <button onclick="mostrarAtividades()">Atividades</button>
    <button onclick="mostrarNotas()">Minha Nota</button>
  </div>

  <div id="content" class="card">
    Selecione uma opção.
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, getDocs, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyXEqSP0WG5CPw7ZrMQ6v5WUb_OPi_UoI",
  authDomain: "spjvp-49fde.firebaseapp.com",
  projectId: "spjvp-49fde",
  storageBucket: "spjvp-49fde.firebasestorage.app",
  messagingSenderId: "790148342609",
  appId: "1:790148342609:web:18a3a59a4d52ba50572970"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario || usuario.tipo !== "aluno"){
  location.href = "index.html";
}

const hora = new Date().getHours();
const periodo = hora < 12 ? "Bom dia" : hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`Olá, ${usuario.nome}, ${periodo}`;

document.getElementById("cargo").innerText = usuario.cargo;

const content = document.getElementById("content");

window.mostrarGrupo = async function(){
  content.innerHTML = "<h2>Meu Grupo</h2>";
  const q = query(collection(db,"alunos"), where("cargo","==",usuario.cargo));
  const snap = await getDocs(q);
  snap.forEach(doc=>{
    const d = doc.data();
    content.innerHTML += `<div class="item">${d.nome}</div>`;
  });
}

window.mostrarPedidos = async function(){
  const snap = await getDoc(doc(db,"alunos",usuario.id));
  const pedidos = snap.data().pedidos || [];
  content.innerHTML = "<h2>Meus Pedidos</h2>";
  pedidos.forEach(p=>{
    content.innerHTML += `<div class="item">
      <b>${p.texto || "Pedido"}</b><br>
      Envio: ${p.envio || "-"}<br>
      Entrega: ${p.entrega || "-"}
    </div>`;
  });
}

window.mostrarAtividades = async function(){
  const snap = await getDoc(doc(db,"atividades",usuario.cargo));
  content.innerHTML = "<h2>Atividades</h2>";
  if(!snap.exists()) return content.innerHTML += "Nenhuma atividade.";
  const atividades = snap.data().atividades || [];
  atividades.forEach(a=>{
    content.innerHTML += `<div class="item">
      <b>${a.nome}</b><br>
      Envio: ${a.envio}<br>
      Entrega: ${a.entrega}
    </div>`;
  });
}

window.mostrarNotas = async function(){
  const turma = usuario.cargo.match(/t(\d+).*G: ([A-C])/i);
  if(!turma) return;
  const turmaDoc = `T${turma[1]} G: ${turma[2]}`;
  const snap = await getDoc(doc(db,"Notas",turmaDoc));
  content.innerHTML = "<h2>Minha Nota</h2>";
  if(!snap.exists()) return content.innerHTML += "Sem notas.";
  const data = snap.data();
  const ob = data["Obediência"]?.[usuario.nome] ?? "-";
  const pa = data["Participação"]?.[usuario.nome] ?? "-";
  content.innerHTML += `<div class="item">
    Obediência: ${ob}<br>
    Participação: ${pa}
  </div>`;
}
</script>
</body>
</html>
